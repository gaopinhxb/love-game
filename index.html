<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>那些年：爱而不得</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f7f3ed;--card:#fefcf9;--text:#2d2a26;--muted:#9a8e82;--line:#e6ddd4;
  --accent:#c4a882;--accent2:#b0a498;--shadow:0 2px 12px rgba(0,0,0,.05);--radius:12px;
  --reading-width:640px
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,"PingFang SC","Noto Sans SC",sans-serif;min-height:100vh;display:flex;justify-content:center;line-height:1.9;-webkit-font-smoothing:antialiased}
#app{max-width:var(--reading-width);width:100%;position:relative;min-height:100vh;display:flex;flex-direction:column}

/* START SCREEN */
#startScreen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;background:linear-gradient(160deg,#f7f3ed 0%,#efe7db 100%);z-index:100}
.logo{text-align:center;margin-bottom:20px}
.logo-main{font-size:42px;font-weight:200;letter-spacing:16px;color:var(--text);position:relative;display:inline-block}
.logo-main::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(196,168,130,.3) 50%,transparent 100%);pointer-events:none}
.logo-sub{display:block;font-size:13px;letter-spacing:8px;color:var(--muted);font-weight:300;margin-top:8px}
.logo-line{width:60px;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:20px auto}
.logo-desc{font-size:12px;line-height:2.2;color:var(--muted);max-width:320px;margin:0 auto 32px;text-align:center}

/* GENDER SELECT */
#genderScreen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;background:var(--bg);z-index:100}
.gender-title{font-size:18px;letter-spacing:4px;margin-bottom:24px;color:var(--text);font-weight:400}
.gender-grid{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
.gender-card{width:140px;padding:24px 16px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);text-align:center;cursor:pointer;transition:all .3s}
.gender-card:hover{background:#f5efe8;border-color:var(--accent);transform:translateY(-3px);box-shadow:var(--shadow)}
.gender-icon{font-size:40px;display:block;margin-bottom:4px}
.gender-label{font-size:15px;color:var(--text);letter-spacing:2px}
.gender-desc{font-size:11px;color:var(--muted);margin-top:4px}

/* GAME */
#gameScreen{display:none;height:100vh;flex-direction:column;width:100%}
#topBar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--line);flex-shrink:0;background:var(--bg)}
#topBar .status{font-size:10px;color:var(--muted);letter-spacing:1px}
#topBar .status span{color:var(--accent)}
#topBar .nav-btn{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px 8px;transition:.2s;font-family:inherit}
#topBar .nav-btn:hover{color:var(--text)}
[data-mode="choice"] #backBtn{color:var(--accent)}

#progressBar{height:2px;background:var(--line);flex-shrink:0}
#progressFill{height:100%;background:var(--accent);width:0%;transition:width .6s ease}

#reader{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;display:flex;flex-direction:column;justify-content:center}
#reader::-webkit-scrollbar{width:3px}
#reader::-webkit-scrollbar-thumb{background:var(--line);border-radius:3px}

#sceneName{font-size:10px;color:var(--muted);letter-spacing:2px;margin-bottom:4px;display:none}
#speaker{font-size:13px;color:var(--accent);margin-bottom:2px;opacity:0;transition:opacity .3s;min-height:20px}
#speaker.show{opacity:1}

#storyText{font-size:16px;line-height:2.1;word-break:break-word;white-space:pre-wrap;transition:opacity .3s;min-height:60px}
#storyText .it{color:var(--accent2);font-style:italic;display:block;margin:10px 0;padding:4px 14px;border-left:2px solid var(--line);font-size:15px}
#storyText .sys{color:var(--accent2);font-style:italic;font-size:14px}
#storyText .dl{color:#8a7a6a}

#continueHint{font-size:11px;color:var(--muted);text-align:center;margin:12px 0;cursor:pointer;opacity:0;transition:.3s;user-select:none}
#continueHint.show{opacity:1}

#choices{display:none;flex-direction:column;gap:8px;margin:16px 0;opacity:0;transition:opacity .4s}
#choices.show{opacity:1;display:flex}
#choices button{width:100%;padding:14px 18px;border:1px solid var(--line);border-radius:var(--radius);background:var(--card);cursor:pointer;font-size:14px;text-align:left;transition:all .2s;line-height:1.6;font-family:inherit;outline:none;color:var(--text)}
#choices button:hover{background:#f5efe8;border-color:var(--accent);transform:translateX(4px)}
#choices button .ht{font-size:10px;color:var(--accent2);margin-right:6px}

/* SCENE TRANSITION */
#sceneOverlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:50;opacity:0;pointer-events:none;transition:opacity .5s}
/* STORY CARD - inline scene transition */
.story-card{text-align:center;padding:28px 16px;margin:16px 0;border-radius:12px;background:linear-gradient(135deg,#fefcf9,#f5efe8);border:1px solid #e6ddd4;animation:cardIn .5s ease both}
.story-card .sc-line{width:40px;height:1px;background:linear-gradient(90deg,transparent,#c4a882,transparent);margin:8px auto}
.story-card .sc-name{font-size:18px;letter-spacing:6px;color:#2d2a26;font-weight:300;margin:8px 0}
.story-card .sc-desc{font-size:13px;color:#9a8e82;line-height:1.8;max-width:400px;margin:0 auto}

/* CRITICAL MOMENT CARD */
.moment-card{text-align:center;padding:32px 20px;margin:20px 0;border-radius:12px;background:linear-gradient(135deg,#f5efe8,#efe7db);border:1px solid #c4a882;position:relative;overflow:hidden}
.moment-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,#c4a882,transparent)}
.moment-card .mc-icon{font-size:36px;display:block;margin-bottom:8px}
.moment-card .mc-title{font-size:17px;letter-spacing:4px;color:#2d2a26;font-weight:400;margin-bottom:6px}
.moment-card .mc-desc{font-size:13px;color:#9a8e82;line-height:1.8;max-width:380px;margin:0 auto}

/* TIP CARD - 情感小知识 */
.tip-card{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;margin:16px 0;border-radius:10px;background:#f5efe8;border:1px solid #e6ddd4;animation:cardIn .5s ease both}
.tip-card .tip-icon{font-size:20px;flex-shrink:0;margin-top:2px}
.tip-card .tip-label{font-size:10px;color:#b0a498;letter-spacing:2px;margin-bottom:4px;font-weight:500}
.tip-card .tip-text{font-size:13px;color:#6b6258;line-height:1.7}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
#sceneOverlay.show{opacity:1;pointer-events:auto}
#sceneOverlay .sn{font-size:16px;letter-spacing:6px;color:var(--accent);margin-bottom:6px;font-weight:300}
#sceneOverlay .sd{font-size:12px;color:var(--muted);max-width:340px;text-align:center;line-height:1.8}

/* ENDING SCREEN */
#endingScreen{display:none;position:fixed;inset:0;flex-direction:column;align-items:center;justify-content:center;padding:40px 24px;background:var(--bg);z-index:101;text-align:center}
#endingScreen .et{font-size:12px;letter-spacing:4px;color:var(--accent);margin-bottom:8px;font-weight:400}
#endingScreen .etitle{font-size:24px;font-weight:300;letter-spacing:6px;margin-bottom:20px;color:var(--text)}
#endingScreen .edesc{font-size:14px;line-height:2.2;color:var(--text);max-width:500px;margin:0 auto 20px}
#endingScreen .eclose{font-size:13px;color:var(--muted);font-style:italic;max-width:400px;margin:0 auto 24px;line-height:1.8}
#endingScreen .btn-group{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}

/* BUTTONS */
.btn{padding:12px 44px;border:1px solid var(--accent);border-radius:28px;background:transparent;color:var(--text);font-size:14px;cursor:pointer;letter-spacing:4px;transition:.3s;font-family:inherit;outline:none}
.btn:hover{background:var(--accent);color:#fff}
.btn-sm{padding:8px 28px;font-size:12px;letter-spacing:2px;border-radius:20px}

/* MENU */
#menuOverlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:80;display:none}
#menuPanel{position:fixed;top:0;right:-320px;width:300px;height:100vh;background:var(--card);z-index:81;padding:24px;box-shadow:-4px 0 20px rgba(0,0,0,.06);transition:right .35s ease;overflow-y:auto}
#menuPanel.open{right:0}
#menuOverlay.show{display:block}
#menuPanel .menu-title{font-size:12px;color:var(--muted);letter-spacing:3px;margin-bottom:20px}
#menuPanel .menu-item{display:block;width:100%;padding:12px 0;border:none;background:none;color:var(--text);font-size:14px;text-align:left;cursor:pointer;border-bottom:1px solid var(--line);transition:.2s;font-family:inherit}
#menuPanel .menu-item:hover{color:var(--accent);padding-left:8px}

@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
.fade-in{animation:fadeIn .4s ease both}
.fade-out{animation:fadeOut .3s ease both}

@media(max-width:480px){
  .logo-main{font-size:32px;letter-spacing:10px}
  #storyText{font-size:15px}
  #choices button{font-size:13px;padding:12px 14px}
  #endingScreen .etitle{font-size:20px}
}
</style>
</head>

<div id="app">
  <!-- START SCREEN -->
  <div id="startScreen">
    <div class="logo">
      <span class="logo-main">那些年<span class="logo-sub">爱而不得</span></span>
    </div>
    <div class="logo-line"></div>
    <div class="logo-desc">一场关于青春、错过与重逢的交互叙事<br>你的每一个选择，都在书写属于自己的结局<br>99种结局，等你抵达</div>
    <button class="btn" id="startBtn">开始故事</button>
  </div>

  <!-- GENDER SELECT -->
  <div id="genderScreen">
    <div class="gender-title">— 请选择你的视角 —</div>
    <div class="gender-grid">
      <div class="gender-card" onclick="setGender('male')">
        <span class="gender-icon">♂</span>
        <div class="gender-label">男生</div>
        <div class="gender-desc">以男生的视角体验故事</div>
      </div>
      <div class="gender-card" onclick="setGender('female')">
        <span class="gender-icon">♀</span>
        <div class="gender-label">女生</div>
        <div class="gender-desc">以女生的视角体验故事</div>
      </div>
    </div>
  </div>

  <!-- GAME SCREEN -->
  <div id="gameScreen">
    <div id="topBar">
      <button class="nav-btn" id="backBtn" onclick="goBack()" style="visibility:hidden">←</button>
      <div class="status"><span id="valDisplay">35</span> <span id="valName">心动值</span></div>
      <button class="nav-btn" onclick="toggleMenu()">☰</button>
    </div>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div id="reader">
      <div id="sceneName"></div>
      <div id="speaker"></div>
      <div id="storyText"></div>
      <div id="continueHint" onclick="advance()">▼ 继续</div>
      <div id="choices"></div>
    </div>
  </div>

  <!-- SCENE CARD (inline, appears in reader) -->
  <div id="sceneCard" class="story-card" style="display:none">
    <div class="sc-line"></div>
    <div class="sc-name" id="sceneCardTitle"></div>
    <div class="sc-desc" id="sceneCardDesc"></div>
    <div class="sc-line"></div>
  </div>
  
  <!-- TIP CARD (情感小知识, appears at key moments) -->
  <div id="tipCard" class="tip-card" style="display:none">
    <div class="tip-icon">💡</div>
    <div class="tip-label">情感小知识</div>
    <div class="tip-text" id="tipText"></div>
  </div>

  <!-- ENDING SCREEN -->
  <div id="endingScreen">
    <div class="et" id="endingType"></div>
    <div class="etitle" id="endingTitle"></div>
    <div class="edesc" id="endingDesc"></div>
    <div class="eclose" id="endingClosing"></div>
    <div class="btn-group">
      <button class="btn btn-sm" onclick="showEndingAgain()">再看一次</button>
      <button class="btn btn-sm" onclick="returnHome()">回到开头</button>
    </div>
  </div>

  <!-- MENU -->
  <div id="menuOverlay" onclick="toggleMenu()"></div>
  <div id="menuPanel">
    <div class="menu-title">— 菜单 —</div>
    <button class="menu-item" onclick="returnHome()">回到开头</button>
    <button class="menu-item" id="continueStoryBtn" onclick="toggleMenu()" style="display:none">继续故事</button>
    <button class="menu-item" id="checkpointBtn" onclick="goBackChoice();toggleMenu()">回到上一步</button>
  </div>
</div>

  "nodes": {
    "gender_select": {
      "chapterTitle": "楔子·那些年",
      "scene": {
        "id": "时光的起点",
        "name": "时光的起点",
        "description": "秋日校园，一切从一片飘落的梧桐叶开始。",
        "type": "major"
      },
      "progress": 1,
      "ambient": "wind",
      "segments": [
        {
          "text": "九月。初秋的风裹着桂花香漫过整条林荫道。梧桐叶开始泛黄，偶尔有一两片打着旋儿落下来，落在你的肩膀上或者地面上。",
          "speaker": "系统"
        },
        {
          "text": "你站在新校门前。行李箱滚轮在水泥地上发出沉闷的声响。你抬头看了一眼校门上的名字——那几个金色大字在阳光下闪闪发亮。",
          "speaker": "系统"
        },
        {
          "text": "阳光从梧桐叶的缝隙里漏下来，在你崭新的白衬衫上投下晃动的光斑。空气里有刚修剪过的青草味——割草机嗡嗡响了一整个上午。远处食堂飘来的饭菜香混着桂花味，让你忽然觉得有点饿了。",
          "speaker": "系统"
        },
        {
          "text": "你深吸一口气。教学楼的铃声刚好响了——急促的、催促的铃声。人群开始流动——有人在笑，有人在跑，有人在树荫下和一个女生说着什么。你站在人流中央，拎着你的行李箱，忽然意识到：从这一刻起，一切都是新的了。新的城市、新的学校、新的人——还有那些你还没遇见的，将改变你一生的故事。"
        }
      ],
      "choices": [
        {
          "text": "我是男生",
          "next": "gender_male_intro",
          "changes": {
            "set": {
              "playerGender": "male",
              "currentRoute": "male"
            }
          }
        },
        {
          "text": "我是女生",
          "next": "gender_female_intro",
          "changes": {
            "set": {
              "playerGender": "female",
              "currentRoute": "female"
            }
          }
        }
      ]
    },
    "gender_male_intro": {
      "scene": {
        "id": "男生宿舍楼",
        "name": "男生宿舍楼",
        "description": "楼道里飘着泡面和洗衣粉的味道。",
        "type": "major"
      },
      "progress": 3,
      "ambient": "wind",
      "segments": [
        {
          "text": "你拎着行李走进了男生宿舍楼。楼道里光线有点暗，墙壁是那种被无数人蹭过的米白色，上面有球印、脚印和各种不明污渍。空气里混杂着泡面的味道、洗衣粉的味道、还有一点点汗味——很真实的那种男生宿舍的味道。",
          "speaker": "系统"
        },
        {
          "text": "你的宿舍在302。推开门——",
          "speaker": "系统"
        },
        {
          "text": "房间里三个人同时抬起头。靠窗的那个最先开口——「新来的？睡那张空床。」他指了指靠门的下铺。床板上铺着一张凉席，看起来是上一任主人留下的。"
        },
        {
          "text": "「谢谢。」你放下行李箱。靠窗那个点了点头又转回去打游戏了。上铺探下来一个脑袋——「兄弟哪儿人？」你报了你的城市名。他咧嘴一笑——「隔壁市的！以后回家可以一起走！」坐在书桌前看书的那个没回头，但举了举手算是打招呼。"
        },
        {
          "text": "你环顾这个小小的空间——四张床、四张桌子、一个阳台、一个空调。这就是你接下来四年要住的地方了。你打开行李箱开始收拾东西——窗外传来操场上的叫喊声、篮球拍地的声音。你忽然觉得——这座陌生的城市，好像也没那么陌生了。"
        }
      ],
      "choices": [
        {
          "text": "去参加新生见面会",
          "next": "male_intro_meet"
        },
        {
          "text": "先去校园里逛逛",
          "next": "male_intro_walk"
        }
      ]
    },
    "male_intro_meet": {
      "scene": {
        "id": "体育馆",
        "name": "体育馆",
        "description": "新生见面会。空调开得很足。",
        "type": "major"
      },
      "progress": 5,
      "ambient": "wind",
      "segments": [
        {
          "text": "体育馆里坐满了人。空调开得太足了——你搓了搓手臂上的鸡皮疙瘩。台上的校长正在讲这所学校的百年历史，但你一个字都没听进去。",
          "speaker": "系统"
        },
        {
          "text": "你的目光漫无目的地扫过人群——然后停住了。",
          "speaker": "系统"
        },
        {
          "text": "第三排靠过道的位置。一个穿白色连衣裙的女生正在低头看书。在周围所有人都在玩手机的人群里，她像一个不属于这个时代的画面——安静地坐着，低头翻页，手指轻轻划过书页的边缘。她的长发垂下来遮住了半边脸，你能看到的只有她的侧脸——安静的、专注的、像一幅还没有上色的素描。"
        },
        {
          "text": "她似乎感觉到了你的目光。她抬起头——",
          "speaker": "系统"
        },
        {
          "text": "你们的目光在空气中相遇了。不到一秒——但她微微愣了一下，然后礼貌地笑了一下，又重新低下头看书。那个笑容很淡——淡到你可能觉得自己看错了。但你的心跳不会骗你——它漏了一拍。"
        },
        {
          "text": "你坐在座位上，手心有点出汗。体育馆的空调忽然没那么冷了。"
        }
      ],
      "choices": [
        {
          "text": "「那个女生是谁？我想认识她」",
          "next": "male_meet_suwan",
          "changes": {
            "importantFlag": {
              "flag": "interested_suwan",
              "label": "对白衣女生一见钟情"
            }
          }
        },

          "text": "先和旁边的哥们儿聊天",
          "next": "male_meet_friend",
          "changes": {
            "val": 5
          }
        },
        {
          "text": "发信息给高中同学",
          "next": "male_meet_oldfriend",
          "changes": {
            "val": -3
          }
        }
      ]
    },
    "male_intro_walk": {
      "scene": {
        "id": "校园漫步",
        "name": "校园漫步",
        "description": "秋天的校园很美。梧桐叶铺了满地。",
        "type": "major"
      },
      "progress": 5,
      "ambient": "wind",
      "segments": [
        {
          "text": "你决定不急着回宿舍——一个人在校园里走走。",
          "speaker": "系统"
        },
        {
          "text": "梧桐树夹道而立——很老的树了，树干粗到一个人抱不住。金黄的叶子铺了一地，踩上去发出细碎的脆响。你走得很慢——穿过长长的林荫道、路过图书馆巨大的玻璃幕墙、经过操场——一群人在踢球，欢呼声和哨声混在一起飘过来。",
          "speaker": "系统"
        },
        {
          "text": "你走到一棵很大的银杏树下——金黄的叶子像一把撑开的巨伞，阳光透过叶隙落下来，在地上铺了一层碎金。树下有一张长椅。你正准备坐下来——然后你看到了椅背上刻着的几个字。"
        },
        {
          "text": "字迹很浅，像是很久以前刻的。经过风雨的冲刷已经有些模糊了——但仍然可以辨认出来："
        },
        {
          "text": "『我在这里等过你。』"
        },
        {
          "text": "你看着那几个字，忽然觉得这个校园——好像藏着很多故事。"
        }
      ],
      "choices": [
        {
          "text": "去图书馆看看",
          "next": "male_library",
          "changes": {
            "val": 3
          }
        },
        {
          "text": "去操场打球",
          "next": "male_playground",
          "changes": {
            "val": 5
          }
        },
        {
          "text": "回宿舍",
          "next": "male_dorm_meet"
        }
      ]
    },
    "male_meet_friend": {
      "scene": {
        "id": "新朋友",
        "name": "新朋友",
        "description": "旁边坐着一个胖胖的男生。他先开了口。",
        "type": "major"
      },
      "progress": 6,
      "segments": [
        {
          "text": "「哥们儿，你也是新生？」他笑起来眼睛眯成一条缝。",
          "speaker": "系统"
        },
        {
          "text": "「对啊，你也是？」你转过头。",
          "speaker": "系统"
        },
        {
          "text": "「我叫大胖——！」他伸出手来，「以后就是哥们儿了！」你握住了他的手——很有力。后来大胖成了你在大学里最好的朋友之一——虽然你一直不确定他的真名到底是不是叫大胖。他带你去吃了学校附近最好吃的烧烤、带你去网吧通宵开黑、在你失恋的时候陪你喝了一整箱啤酒然后在阳台上对着月亮唱歌。",
          "speaker": "系统"
        },
        {
          "text": "但这是后来的事了。现在——散会了，大胖拉着你往外走：「走走走！我带你去认识几个学姐！我跟你说——美院的学姐最漂亮了！」",
          "speaker": "系统"
        },
        {
          "text": "你被大胖拽着往前走——走了一半你回头看了一眼体育馆。那个白色连衣裙的女生已经不见了。"
        }
      ],
      "choices": [

          "text": "跟着大胖去认识学姐",
          "next": "male_intro_life",
          "changes": {
            "val": 5

          "next": "male_meet_suwan"
        }
      ]
    },
    "male_meet_oldfriend": {

        "name": "老同学",
        "description": "你给高中同学发了条消息。",

      "progress": 6,
      "segments": [

          "text": "「我到学校了！这边还不错！」你按下了发送键。",

    "male_oldfriend_reunion": {

        "id": "叙旧",

        {

    "male_dorm_meet": {

          "text": "图书馆很大——三层楼，落地窗采光很好。里面很安静，只有空调的低鸣声和偶尔翻书的声音。你在书架之间穿行——手指划过一本本书的书脊，目光在一排排书名上跳来跳去。",

let state = {
  story: null, currentNodeId: '', segmentIndex: 0, val: 35,
  vars: {}, flags: [], history: [], pageHistory: [],
  choiceHistory: [], currentSceneKey: '',
  endings: [], achievements: [], sessionStartedAt: null
};

// ===== UTILITIES =====
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }
function slug(t) { return t.replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g, '_').toLowerCase(); }

// ===== LOAD STORY =====
function loadStory(json) {
  if (!json || !json.meta || !json.startNodeId || !json.nodes) throw new Error('Invalid story format');
  if (!json.nodes[json.startNodeId]) throw new Error('Start node not found');
  state.story = json;
  state.val = clamp(json.meta.initialVariable ?? 0, 0, 100);
  state.vars = JSON.parse(JSON.stringify(json.variables || {}));
  state.flags = [];
  state.history = [];
  state.pageHistory = [];
  state.choiceHistory = [];
  state.currentSceneKey = '';
  state.endings = readEndings(json);
  state.achievements = readAchievements(json);
  document.getElementById('valName').textContent = json.meta.variableName || '状态值';
  updateValDisplay();
}

function readEndings(json) {
  const res = [];
  for (const [id, node] of Object.entries(json.nodes)) {
    if (node.isEnding) res.push({ id, ...node });
  }
  return res;
}

function readAchievements(json) {
  const res = [];
  for (const [id, ach] of Object.entries(json.achievements || {})) {
    res.push({ id, ...ach, unlocked: false });
  }
  return res;
}

// ===== GAME START =====
function startGame() {
  document.getElementById('genderScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  state.sessionStartedAt = Date.now();
  processNode(state.story.startNodeId);
}

function setGender(g) {
  state.vars.playerGender = g;
  state.vars.currentRoute = g;
  startGame();
}

// ===== NODE PROCESSING =====
function getNode(id) { return state.story?.nodes?.[id] || null; }

function processNode(id, opts = {}) {
  const node = getNode(id);
  if (!node) { showToast('节点不存在: ' + id); return; }
  
  state.currentNodeId = id;
  state.segmentIndex = 0;
  
  // Scene transition
  const scene = normalizeScene(node);
  if (scene && !opts.fromHistory) {
    showSceneTransition(scene, node);
  }
  
  // Chapter title
  if (node.chapterTitle && !opts.fromHistory) {
    showToast(node.chapterTitle, 2000);
  }
  
  // Show tip at node start
  if (node.startTip) showTipCard(node.startTip);
  
  // Show moment card for key moments
  if (node.momentIcon && node.momentTitle) {
    showMomentCard(node.momentIcon, node.momentTitle, node.momentDesc || '');
  }
  
  // Check ending
  if (node.isEnding) {
    showEnding(node);
    return;
  }
  
  pushHistory();
  clearReader();
  renderSegments(node.segments || []);
  updateProgress(node.progress || 0);
  document.getElementById('backBtn').style.visibility = 'visible';
}

function normalizeScene(node) {
  const sc = node?.scene;
  if (!sc) return null;
  if (typeof sc === 'string') return { key: sc, name: sc, description: '' };
  return { key: sc.id || sc.name, name: sc.name, description: sc.description || '' };
}

function showSceneTransition(scene, node) {
  if (scene.key === state.currentSceneKey && !node.chapterTitle) return;
  state.currentSceneKey = scene.key;
  const el = document.getElementById('sceneCard');
  document.getElementById('sceneCardTitle').textContent = scene.name;
  document.getElementById('sceneCardDesc').textContent = scene.description || '';
  el.style.display = 'block';
  el.style.animation = 'none';
  void el.offsetWidth;
  el.style.animation = 'cardIn .5s ease both';
  setTimeout(() => { el.style.display = 'none'; }, 2500);
}

// ===== SEGMENT RENDERING =====
function clearReader() {
  document.getElementById('storyText').innerHTML = '';
  document.getElementById('speaker').className = '';
  document.getElementById('speaker').textContent = '';
  document.getElementById('choices').className = '';
  document.getElementById('choices').style.display = 'none';
  document.getElementById('continueHint').className = '';
  document.getElementById('sceneName').style.display = 'none';
}

function renderSegments(segs) {
  if (!segs || segs.length === 0) {
    renderChoices();
    return;
  }
  state.segIndex = 0;
  state.segments = segs;
  document.getElementById('continueHint').classList.add('show');
  showSegment(0);
}

let segIndex = 0;
let segments = [];

function showSegment(idx) {
  const el = document.getElementById('storyText');
  const sp = document.getElementById('speaker');
  const segs = state.segments || segments;
  if (idx >= segs.length) {
    document.getElementById('continueHint').textContent = '▼ 继续';
    renderChoices();
    return;
  }
  const s = segs[idx];
  if (s.speaker) {
    sp.textContent = s.speaker;
    sp.className = 'show';
  } else {
    sp.className = '';
  }
  
  // Apply effects
  let html = escHtml(s.text);
  el.innerHTML = html;
  el.style.opacity = '0';
  setTimeout(() => { el.style.opacity = '1'; }, 50);
  
  segIndex = idx;
  document.getElementById('continueHint').textContent = idx < segs.length - 1 ? '▼ 继续' : '→';
}

function advance() {
  const segs = state.segments || segments;
  if (segIndex < segs.length - 1) {
    showSegment(segIndex + 1);
  } else {
    // Show choices
    document.getElementById('continueHint').className = '';
    renderChoices();
  }
}

function escHtml(t) {
  const div = document.createElement('div');
  div.textContent = t;
  return div.innerHTML;
}

// ===== CHOICES =====
function renderChoices() {
  const node = getNode(state.currentNodeId);
  if (!node) return;
  
  // Show tip if available
  if (node.tip) showTipCard(node.tip);
  
  // Show moment card for critical choices
  if (node.momentIcon && node.momentTitle) {
    showMomentCard(node.momentIcon, node.momentTitle, node.momentDesc || '');
  }
  
  const el = document.getElementById('choices');
  el.innerHTML = '';
  
  // Check routes first (auto-routing)
  if (node.routes) {
    for (const route of node.routes) {
      if (checkCondition(route.condition)) {
        processNode(route.next);
        return;
      }
    }
  }
  
  // Single next (auto-advance)
  if (node.next) {
    processNode(node.next);
    return;
  }
  
  // Choices
  const choices = node.choices || [];
  if (choices.length === 0) {
    if (!node.isEnding) {
      showToast('故事已结束');
    }
    return;
  }
  
  // Filter by condition
  const available = choices.filter(c => !c.condition || checkCondition(c.condition));
  
  if (available.length === 0) {
    showToast('没有可用的选项');
    return;
  }
  
  available.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.textContent = c.text;
    btn.onclick = () => selectChoice(c);
    el.appendChild(btn);
  });
  
  el.style.display = 'flex';
  el.className = 'show';
  document.getElementById('backBtn').style.visibility = 'visible';
}

function selectChoice(choice) {
  // Apply changes
  if (choice.changes) {
    applyChanges(choice.changes);
  }
  pushPageHistory();
  processNode(choice.next);
}

function applyChanges(changes) {
  if (!changes) return;
  if (changes.val) state.val = clamp(state.val + changes.val, 0, 100);
  if (changes.valSet !== undefined) state.val = clamp(changes.valSet, 0, 100);
  if (changes.set) Object.assign(state.vars, changes.set);
  if (changes.addFlag) state.flags.push(changes.addFlag);
  if (changes.removeFlag) state.flags = state.flags.filter(f => f !== changes.removeFlag);
  if (changes.addFlags) changes.addFlags.forEach(f => state.flags.push(f));
  if (changes.importantFlag) {
    const flag = typeof changes.importantFlag === 'string' ? changes.importantFlag : changes.importantFlag.flag;
    state.flags.push(flag);
    showImportantDecision(flag);
  }
  if (changes.importantFlags) {
    changes.importantFlags.forEach(f => { state.flags.push(f); });
  }
  if (changes.unlockAchievement) unlockAchievement(changes.unlockAchievement);
  updateValDisplay();
}

function checkCondition(cond) {
  if (!cond || cond === 'default') return true;
  // Simple condition parser
  const m = cond.match(/(val|hasFlag|!hasFlag)\s*(>=|<=|>|<|==|!=)?\s*(.+)?/);
  if (!m) return true;
  const [_, type, op, val] = m;
  if (type === 'hasFlag') return state.flags.includes(val.trim());
  if (type === '!hasFlag') return !state.flags.includes(val.trim());
  if (type === 'val') {
    const n = Number(val.trim());
    switch (op) {
      case '>=': return state.val >= n;
      case '<=': return state.val <= n;
      case '>': return state.val > n;
      case '<': return state.val < n;
      case '==': return state.val === n;
      case '!=': return state.val !== n;
      default: return true;
    }
  }
  return true;
}

// ===== ENDINGS =====
function showEnding(node) {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('endingScreen').style.display = 'flex';
  document.getElementById('endingType').textContent = node.type || '结局';
  document.getElementById('endingTitle').textContent = node.title;
  document.getElementById('endingDesc').innerHTML = escHtml(node.description || '') + '';
  document.getElementById('endingClosing').textContent = node.closing || '';
  if (node.achievement) unlockAchievement(node.achievement);
  recordEnding(node);
}

function showEndingAgain() {
  document.getElementById('endingScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'flex';
  processNode(state.currentNodeId);
}

function returnHome() {
  document.getElementById('endingScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('startScreen').style.display = 'flex';
  document.getElementById('genderScreen').style.display = 'none';
  state.story = null;
  initGame();
}

function unlockAchievement(id) {
  const ach = state.achievements.find(a => a.id === id);
  if (ach && !ach.unlocked) {
    ach.unlocked = true;
    showToast('成就解锁: ' + (ach.title || id));
  }
}

function recordEnding(node) {
  if (!state.endings.find(e => e.id === state.currentNodeId)) {
    state.endings.push({ id: state.currentNodeId, ...node });
  }
}

// ===== NAVIGATION =====
function pushHistory() {
  state.history.push({
    currentNodeId: state.currentNodeId,
    val: state.val,
    vars: JSON.parse(JSON.stringify(state.vars)),
    flags: [...state.flags],
    currentSceneKey: state.currentSceneKey
  });
  if (state.history.length > 80) state.history.shift();
}

function pushPageHistory() {
  state.pageHistory.push({
    currentNodeId: state.currentNodeId,
    val: state.val,
    flags: [...state.flags]
  });
  if (state.pageHistory.length > 120) state.pageHistory.shift();
}

function goBack() {
  if (state.history.length < 2) return;
  state.history.pop();
  const snap = state.history[state.history.length - 1];
  state.val = snap.val;
  state.vars = JSON.parse(JSON.stringify(snap.vars));
  state.flags = [...snap.flags];
  state.currentSceneKey = snap.currentSceneKey;
  updateValDisplay();
  processNode(snap.currentNodeId, { fromHistory: true });
}

function goBackChoice() {
  if (state.pageHistory.length === 0) { showToast('没有上一步'); return; }
  const snap = state.pageHistory.pop();
  state.val = snap.val;
  state.flags = [...snap.flags];
  updateValDisplay();
  processNode(snap.currentNodeId, { fromHistory: true });
}

// ===== UI UPDATES =====
function updateValDisplay() {
  document.getElementById('valDisplay').textContent = Math.round(state.val);
}

function updateProgress(p) {
  document.getElementById('progressFill').style.width = clamp(p, 0, 100) + '%';
}

function showToast(msg, duration) {
  let el = document.getElementById('toast');
  if (!el) {
    el = document.createElement('div');
    el.id = 'toast';
    el.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px 24px;z-index:200;font-size:14px;color:var(--text);box-shadow:var(--shadow);text-align:center;line-height:1.6;max-width:300px;transition:opacity .3s';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => { el.style.opacity = '0'; }, duration || 2000);
}


function showMomentCard(icon, title, desc) {
  const el = document.getElementById('storyText');
  const card = document.createElement('div');
  card.className = 'moment-card';
  card.innerHTML = '<span class="mc-icon">' + icon + '</span><div class="mc-title">' + title + '</div><div class="mc-desc">' + desc + '</div>';
  el.appendChild(card);
  setTimeout(() => card.scrollIntoView({ behavior: 'smooth', block: 'center' }), 100);
}

function showTipCard(text) {
  const el = document.getElementById('tipText');
  const card = document.getElementById('tipCard');
  el.textContent = text;
  card.style.display = 'flex';
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'cardIn .5s ease both';
}
function showImportantDecision(label) {
  const flag = typeof label === 'string' ? label : (label.label || label.flag || '');
  showToast('⚡ 重要决定已记录' + (flag ? ': ' + flag : ''));
}

function toggleMenu() {
  const m = document.getElementById('menuPanel');
  const o = document.getElementById('menuOverlay');
  m.classList.toggle('open');
  o.classList.toggle('show');
}

// ===== INIT =====
function initGame() {
  try {
    const story = STORY;
    loadStory(story);
    document.getElementById('startBtn').onclick = function() {
      document.getElementById('startScreen').style.display = 'none';
      document.getElementById('genderScreen').style.display = 'flex';
    };
    console.log('Story loaded:', Object.keys(story.nodes).length, 'nodes');
  } catch(e) {
    console.error('Failed to load story:', e);
    document.getElementById('startBtn').textContent = '加载失败，刷新重试';
  }
}

document.addEventListener('DOMContentLoaded', initGame);
